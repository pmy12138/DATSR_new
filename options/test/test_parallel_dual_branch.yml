# options/test/test_parallel_dual_branch.yml
name: test_parallel_dual_branch_noisy
suffix: ~
scale: 4
model_type: WaveletParallelRestorationModel
set_CUDA_VISIBLE_DEVICES: ~
crop_border: ~
gpu_ids: [0]

datasets:
  test_0:
    name: val_CUFED
    type: NoisyRefCUFEDDataset
    dataroot_in: ./datasets/CUFED5_sigma50
    dataroot_gt: ./datasets/CUFED5          # clean GT
    dataroot_ref: ./datasets/CUFED5
    io_backend:
      type: disk
    bicubic_model: PIL
    ann_file: ./datasets/CUFED5_pairs.txt

val_func: BasicSRValidation
save_img: true

# network structures
network_g:
  type: WaveletParallelRestorationNet
  ngf: 64
  n_blocks: 2
  groups: 2
  embed_dim: 32
  depths: [2,2]
  num_heads: [2,2]
  window_size: 8
  use_checkpoint: True
  use_wdm: true
  use_denoised_matching: true
  use_ref_frequency: true
  use_similarity_gate: true

network_map:
  type: FlowSimCorrespondenceGenerationArch
  patch_size: 3
  stride: 1
  vgg_layer_list: ['relu1_1', 'relu2_1', 'relu3_1']
  vgg_type: 'vgg19'
  use_freq_matching: true

network_extractor:
  type: ContrasExtractorSep

# path
path:
  pretrain_model_g: experiments/train/train_parallel_dual_branch\models\net_g_40000.pth
  pretrain_model_feature_extractor: experiments/pretrained_model/feature_extraction.pth
  strict_load: false
  root: experiments/test/
