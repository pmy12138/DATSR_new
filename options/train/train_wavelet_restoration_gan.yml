# options/train/train_wavelet_restoration_gan.yml
name: train_wavelet_restoration_gan
use_tb_logger: true
model_type: WaveletRefRestorationModel
map_type: online_CUFED_swap
scale: 4
crop_border: ~
set_CUDA_VISIBLE_DEVICES: ~
gpu_ids: [0]

# datasets
datasets:
  train:
    name: CUFED_noisy
    type: NoisyRefCUFEDDataset
    dataroot_in: data/CUFED/train/input
    dataroot_ref: data/CUFED/train/ref
    io_backend:
      type: disk

    gt_size: 160
    use_flip: true
    use_rot: true

    noise_sigma: 0.196  # 50/255

    bicubic_model: PIL

    use_shuffle: true
    n_workers: 6
    batch_size: 9
    dataset_enlarge_ratio: 1000

  val:
    name: val_CUFED_noisy
    type: NoisyRefCUFEDDataset
    dataroot_in: data/CUFED/test/CUFED5
    dataroot_ref: data/CUFED/test/CUFED5
    io_backend:
      type: disk

    ann_file: ./datasets/CUFED5_pairs.txt
    noise_sigma: 0.196
    bicubic_model: PIL

# network structures
network_g:
  type: NewSwinUnetv3RestorationNet
  ngf: 128
  n_blocks: 8
  groups: 8
  embed_dim: 128
  depths: [4, 4]
  num_heads: [4, 4]
  window_size: 8
  use_checkpoint: true
  wav_channels: 64
network_d:
  type: ImageDiscriminator
  in_nc: 3
  ndf: 32
network_map:
  type: FlowSimCorrespondenceGenerationArch
  patch_size: 3
  stride: 1
  vgg_layer_list: ['relu1_1', 'relu2_1', 'relu3_1']
  vgg_type: 'vgg19'
network_extractor:
  type: ContrasExtractorSep

network_wavelet:
  type: WaveletFrequencyBranch
  out_channels: 64

# path
path:
  pretrain_model_g: experiments/train/train_wavelet_restoration_mse/models/net_g_400000.pth
  pretrain_model_d: ~
  pretrain_model_feature_extractor: experiments/pretrained_model/feature_extraction.pth
  pretrain_model_wavelet: experiments/train/train_wavelet_restoration_mse/models/net_wavelet_400000.pth
  strict_load: true
  resume_state: ~
  root: experiments/train/

# training settings
train:
  lr_g: !!float 1e-4
  lr_offset: !!float 1e-4
  lr_relu2_offset: !!float 1e-5
  lr_relu3_offset: !!float 1e-6
  lr_wavelet: !!float 1e-4
  weight_decay_g: 0
  beta_g: [0.9, 0.999]
  lr_d: !!float 1e-4
  weight_decay_d: 0
  beta_d: [0.9, 0.999]
  lr_scheme: MultiStepLR

  niter: 400000
  warmup_iter: -1
  net_g_pretrain_steps: 0
  lr_steps: [72545, 161040]
  lr_gamma: 0.1

  pixel_criterion: L1Loss
  pixel_weight: !!float 1.0
  perceptual_opt:
    layer_weights:
      'relu5_1': 1
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: !!float 1e-4
    style_weight: 0
    norm_img: false
    criterion: fro
  gan_type: wgan
  gan_weight: !!float 1e-6
  grad_penalty_weight: !!float 10.0

  net_d_steps: 1
  net_d_init_steps: 0

  manual_seed: 10

val:
  val_freq: !!float 5e3
  save_img: false

# logger
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3

dist_params:
  backend: nccl
  port: 29746