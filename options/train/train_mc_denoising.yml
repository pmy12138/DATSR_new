name: denoising_16spp
use_tb_logger: true
model_type: RefRestorationModel
map_type: online_CUFED_swap
scale: 4
crop_border: ~
set_CUDA_VISIBLE_DEVICES: ~
gpu_ids: [0]

# datasets
datasets:
  train:
    name: MCDenoising
    type: MCDenoisingDataset
    dataroot_in: datasets/DenosingDataset/train/input_16spp       # 有噪 LR (320x180)
    dataroot_ref: datasets/DenosingDataset/train/ref         # default HR (1280x720)，同时作为 GT 和参考图来源
    dataroot_albedo: datasets/DenosingDataset/train/albedo   # albedo LR (320x180)，作为辅助输入通道
    io_backend:
      type: disk

    gt_size: 160
    use_flip: true
    use_rot: true

    # 参考图几何变换参数
    ref_shift_ratio: 0.2       # 裁剪中心偏移比例
    ref_persp_strength: 0.05   # 透视变换强度

    use_shuffle: true
    n_workers: 4
    batch_size: 2
    dataset_enlarge_ratio: 100

  val:
    name: val_MCDenoising
    type: MCDenoisingDataset
    dataroot_in: datasets/DenosingDataset/test/input_16spp
    dataroot_ref: datasets/DenosingDataset/test/ref
    dataroot_albedo: datasets/DenosingDataset/test/albedo
    io_backend:
      type: disk
    gt_size: 160    # 验证时也裁剪，避免 OOM

# network structures
network_g:
  type: DenoiseSwinUnetv3RestorationNet
  ngf: 64
  n_blocks: 4
  groups: 4
  embed_dim: 64
  depths: [2, 2]
  num_heads: [4, 4]
  window_size: 4
  use_checkpoint: True
  denoise_nf: 64
  denoise_blocks: 4
  denoise_in_nc: 6    # 3ch noisy RGB + 3ch albedo
network_map:
  type: FlowSimCorrespondenceGenerationArch
  patch_size: 3
  stride: 1
  vgg_layer_list: ['relu1_1', 'relu2_1', 'relu3_1']
  vgg_type: 'vgg19'
network_extractor:
  type: ContrasExtractorSep

# path
path:
  pretrain_model_g: ~
  pretrain_model_d: ~
  pretrain_model_feature_extractor: experiments/pretrained_model/feature_extraction.pth
  strict_load: true
  resume_state: ~
  root: experiments/train/

# training settings
train:
  lr_g: !!float 1e-4
  lr_offset: !!float 1e-4
  lr_relu2_offset: !!float 1e-5
  lr_relu3_offset: !!float 1e-6
  weight_decay_g: 0
  beta_g: [0.9, 0.999]
  lr_d: !!float 1e-4
  weight_decay_d: 0
  beta_d: [0.9, 0.999]
  lr_scheme: MultiStepLR

  niter: 100000
  warmup_iter: -1
  net_g_pretrain_steps: 0
  lr_steps: [50000, 150000]
  lr_gamma: 0.1

  pixel_criterion: L1Loss
  pixel_weight: !!float 1.0

  manual_seed: 10

  ref_angle_range: 5.0       # 旋转角度范围 [-5°, 5°]
  ref_scale_min: 0.95        # 缩放下限
  ref_scale_max: 1.05        # 缩放上限
  ref_max_translate: 10      # 最大平移像素数

val:
  val_freq: !!float 5e3
  save_img: False

# logger
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3

dist_params:
  backend: nccl
  port: 29746