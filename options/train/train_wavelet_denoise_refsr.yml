name: train_wavelet_denoise_refsr
use_tb_logger: true
model_type: WaveletRefRestorationModel
map_type: online_CUFED_swap
scale: 4
crop_border: ~
set_CUDA_VISIBLE_DEVICES: ~
gpu_ids: [0]

# datasets
datasets:
  train:
    name: CUFED
    type: RefCUFEDDataset
    dataroot_in: ./datasets/CUFED/input
    dataroot_ref: ./datasets/CUFED/ref
    io_backend:
      type: disk

    gt_size: 160
    use_flip: true
    use_rot: true

    noise_sigma: 50  # add Gaussian noise sigma=50 to LR input

    bicubic_model: PIL

    use_shuffle: true
    n_workers: 2 # 6  # per GPU
    batch_size: 2 # 6
    dataset_enlarge_ratio: 1000

  val:
    name: val_CUFED
    type: RefCUFEDDataset
    dataroot_in: ./datasets/CUFED5
    dataroot_ref: ./datasets/CUFED5
    io_backend:
      type: disk

    ann_file: ./datasets/CUFED5_pairs.txt

    noise_sigma: 0 # 50  # also add noise at validation

    bicubic_model: PIL

# network structures
network_g:
  type: WaveletSwinUnetv3RestorationNet
  ngf: 64
  n_blocks: 4
  groups: 4
  embed_dim: 64
  depths: [ 2, 2 ]
  num_heads: [ 4, 4 ]
  window_size: 8
  use_checkpoint: true
  wave_num_heads: 4
  wave_ffn_expansion: 2.

network_map:
  type: FlowSimCorrespondenceGenerationArch
  patch_size: 3
  stride: 1
  vgg_layer_list: ['relu1_1', 'relu2_1', 'relu3_1']
  vgg_type: 'vgg19'

network_extractor:
  type: ContrasExtractorSep

# path
path:
  pretrain_model_g: ~
  pretrain_model_d: ~
  pretrain_model_feature_extractor: experiments/pretrained_model/feature_extraction.pth
  strict_load: true
  resume_state: experiments/train/train_wavelet_denoise_refsr/training_state/70000.state
  root: experiments/train/

# training settings
train:
  lr_g: !!float 1e-4
  lr_offset: !!float 1e-4
  lr_relu2_offset: !!float 1e-5
  lr_relu3_offset: !!float 1e-6
  weight_decay_g: 0
  beta_g: [0.9, 0.999]
  lr_d: !!float 1e-4
  weight_decay_d: 0
  beta_d: [0.9, 0.999]
  lr_scheme: MultiStepLR

  niter: 150000
  warmup_iter: -1
  net_g_pretrain_steps: 0
  lr_steps: [40000, 70000]
  lr_gamma: 0.1

  pixel_criterion: L1Loss
  pixel_weight: !!float 1.0

  # wavelet-domain loss on SR output
  wavelet_opt:
    loss_weight: !!float 0.1 # 0.5
    ll_weight: 2.0 # 10.0
    hf_weight: 1.0

  # FFT loss on SR output
  fft_opt:
    loss_weight: !!float 0.05 # 0.1

  # denoising loss weight (L1 between WDM output and clean LR)
  denoise_weight: !!float 0.5 # 1.0

  manual_seed: 10

val:
  val_freq: !!float 5e3
  save_img: False

# logger
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3

dist_params:
  backend: nccl
  port: 29746